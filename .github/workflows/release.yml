name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example 0.1.0 or v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: zgent-linux-x86_64
            apt_packages: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_name: zgent-linux-aarch64
            apt_packages: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: zgent-macos-aarch64
            apt_packages: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux cross linker
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Test
        run: cargo test --locked

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ matrix.archive_name }}.tar.gz"
          staging="dist/${{ matrix.archive_name }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/zgent" "$staging/"
          cp "target/${{ matrix.target }}/release/zgentd" "$staging/"
          cp README.md goal.md impl_status.md "$staging/"
          tar -czf "dist/$archive" -C dist "${{ matrix.archive_name }}"
          shasum -a 256 "dist/$archive" > "dist/$archive.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes
          fi
